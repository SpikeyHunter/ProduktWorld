<!doctype html>
<html lang="fr">
	<head>
    <meta charset="utf-8" />

    <link rel="icon" href="/favicon.ico?v=2" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
    
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
    
    <link rel="manifest" href="/site.webmanifest?v=2">
    
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--
      Critical, render-blocking CSS — inlined directly in the HTML so it
      paints before any external stylesheet or JS bundle loads. This is
      what prevents a flash of the page's background image before the
      Preloader's own CSS (position: fixed; z-index: 60) has applied.
      Keep this hex in sync with --color-darkaccent.
    -->
    <style>
      html,
      body {
        background: #0d0706;
        margin: 0;
      }
    </style>

    %sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
